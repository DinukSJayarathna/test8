---
layout: default
---
<article>
  <div class="post-header">
    <div class="wrap">
      <div class="note-meta">{{ page.date | date: "%d %B %Y" }} · {{ page.category | default: "Field Note" }}</div>
      <h1>{{ page.title }}</h1>
    </div>
  </div>
  <div class="post-body">
    <div class="wrap">
      {{ content }}
    </div>
  </div>
</article>
